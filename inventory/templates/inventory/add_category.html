{% extends 'inventory/base.html' %}

{% block title %}Add Category - DistroLoom{% endblock %}

{% block content %}
<div style="display:flex;justify-content:center">
    <div style="width:100%;max-width:28rem">
        <div style="margin-bottom:1.5rem">
            <div class="icon-box icon-box-lg" style="margin-bottom:1rem">📁</div>
            <h2 style="font-size:1.5rem;font-weight:700">Add New Business Category</h2>
            <p style="color:#6b7280;margin-top:.25rem;font-size:.875rem">Example: Tobacco, Sweets, Peanuts, etc.</p>
        </div>

        <form class="form-card" method="POST" action="{% url 'add_category' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Category Name</label>
                <input name="category_name" type="text" required placeholder="Enter category name..."
                    class="form-input">
            </div>  
            <button type="submit" class="btn-primary">Save Category</button>
        </form>

        <a href="{% url 'add_product' %}" class="back-link">← Back to Product Form</a>
    </div>
</div>
{% endblock %}
