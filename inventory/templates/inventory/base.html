<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>{% block title %}DistroLoom{% endblock %}</title>

    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#181c24">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1162/1162251.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1162/1162251.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f2f3f7;
            color: #181c24;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Space Grotesk', sans-serif;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #181c24;
            color: #f2f3f7;
            box-shadow: 0 2px 12px rgba(24, 28, 36, 0.15);
        }

        .nav-inner {
            max-width: 72rem;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 4rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: .25rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: .4rem;
            padding: .4rem .75rem;
            border-radius: .5rem;
            font-size: .875rem;
            font-weight: 500;
            color: rgba(242, 243, 247, 0.6);
            transition: all .2s;
        }

        .nav-link:hover {
            color: #f2f3f7;
            background: rgba(242, 243, 247, 0.1);
        }

        .nav-btn {
            margin-left: .75rem;
            display: flex;
            align-items: center;
            gap: .4rem;
            padding: .5rem 1rem;
            border-radius: .75rem;
            background: #5b4cdb;
            color: #fff;
            font-size: .875rem;
            font-weight: 600;
            border: none;
            transition: all .2s;
            cursor: pointer;
        }

        .nav-btn:hover {
            opacity: 0.9;
            box-shadow: 0 4px 12px rgba(91, 76, 219, 0.3);
        }

        /* Main Container */
        .main-wrap {
            max-width: 72rem;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .main-card {
            background: #fff;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 1px 3px rgba(24, 28, 36, 0.04), 0 8px 24px rgba(24, 28, 36, 0.06);
            border: 1px solid rgba(220, 222, 230, 0.6);
            min-height: 70vh;
        }

        <link rel="manifest" href="/static/manifest.json"><meta name="theme-color" content="#22863a">table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            background: #181c24;
            color: #f2f3f7;
            text-align: left;
            padding: 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .badge {
            background: #ededf9;
            color: #5b4cdb;
            padding: .2rem .5rem;
            border-radius: 10px;
            font-size: .75rem;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
            padding: .75rem 1rem;
            border-radius: .75rem;
            background: #5b4cdb;
            color: #fff;
            font-size: .875rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            color: #6b7280;
            font-size: .875rem;
        }

        @media print {

            .navbar,
            .nav-btn,
            .footer,
            .no-print {
                display: none !important;
            }

            .main-card {
                border: none;
                box-shadow: none;
                padding: 0;
            }
        }

        tbody tr:hover {
            background-color: #f8f9fa;
            transition: background-color 0.2s ease;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="{% url 'inventory_list' %}" class="nav-logo">📦 DistroLoom</a>

            <div class="nav-links">
                {% if user.is_authenticated %}
                <a href="{% url 'inventory_list' %}" class="nav-link">📦 Inventory</a>
                <a href="{% url 'category_list' %}" class="nav-link">📂 Categories</a>
                <a href="{% url 'sales_history' %}" class="nav-link">📜 History</a>
                <a href="{% url 'add_product' %}" class="nav-link">➕ + Add Stock</a>

                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="nav-link"
                        style="background:none; border:none; cursor:pointer; font-family:inherit;">
                        🚪 Logout ({{ user.username }})
                    </button>
                </form>

                <a href="{% url 'create_bill' %}" class="nav-btn">📄 Create Bill</a>

                {% else %}
                <a href="{% url 'login' %}" class="nav-link">🔑 Login</a>
                <a href="{% url 'register' %}" class="nav-link">📝 Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="main-wrap">
        <div class="main-card">
            {% block content %}{% endblock %}
        </div>
    </div>
    <footer class="footer">© 2026 DistroLoom Business Suite</footer>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/static/sw.js').then(function (registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function (err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/serviceworker.js')
                .then(function () {
                    console.log("Service Worker Registered");
                });
        }
    </script>
</body>

</html>
