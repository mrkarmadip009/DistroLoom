<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistroLoom | Business Manager</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            color: #333;
        }

        /* Nav Bar - Sticky so it stays at the top */
        nav {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container {
            max-width: 1000px; /* Made slightly wider for better tables */
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            min-height: 80vh;
        }

        h2 {
            color: var(--primary);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: var(--secondary);
            color: white;
        }

        tr:hover {
            background: #f9f9f9;
        }

        /* Form & Button Styling */
        form p { margin-bottom: 15px; }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-add { background: var(--accent); color: white; }
        .btn-add:hover { background: #219150; }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            background: #eee;
        }
    </style>
</head>

<body>
    <nav>
        <div style="font-size: 1.5rem; font-weight: bold;">
            <a href="{% url 'inventory_list' %}" style="color: white; text-decoration: none;">📦 DistroLoom</a>
        </div>
        <div>
            <a href="{% url 'inventory_list' %}" style="color: white; text-decoration: none; margin-right: 15px;">Inventory</a>
            
            <a href="{% url 'category_list' %}" style="color: white; text-decoration: none; margin-right: 15px;">Categories</a>
            
            <a href="{% url 'sales_history' %}" style="color: white; text-decoration: none; margin-right: 15px;">History</a>

            <a href="{% url 'add_product' %}" style="color: white; text-decoration: none; margin-right: 15px;">+ Add Stock</a>

            <a href="{% url 'create_bill' %}" style="color: #27ae60; background: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-weight: bold;">📝 Create Bill</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer style="text-align: center; padding: 20px; color: #7f8c8d; font-size: 0.9rem;">
        <p>&copy; 2026 DistroLoom Business Suite</p>
    </footer>
</body>
</html>
